<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Gallery</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#05050d;
    color:#00eaff;
    text-align:center;
}



h1{
    margin:30px 0;
    font-size:42px;

    text-shadow:
        0 0 10px #00eaff,
        0 0 25px #ff007f;
}



.gallery-container{
    perspective:1400px;
    height:520px;
    display:flex;
    justify-content:center;
    align-items:center;
}



.gallery{
    position:relative;
    width:320px;
    height:320px;
    transform-style:preserve-3d;
    animation:spin 18s linear infinite;
}


.gallery:hover{
    animation-play-state:paused;
}



.card{
    position:absolute;
    top:50%;
    left:50%;
    transform-style:preserve-3d;
}



.card img{
    width:220px;
    height:140px;
    object-fit:cover;
    border-radius:12px;

    border:3px solid #00eaff;

    box-shadow:
        0 0 12px #00eaff,
        0 0 25px #ff007f;

    cursor:pointer;
    transition:0.3s ease;
}



.card:nth-child(1){ transform:rotateY(0deg) translateZ(420px); }
.card:nth-child(2){ transform:rotateY(45deg) translateZ(420px); }
.card:nth-child(3){ transform:rotateY(90deg) translateZ(420px); }
.card:nth-child(4){ transform:rotateY(135deg) translateZ(420px); }
.card:nth-child(5){ transform:rotateY(180deg) translateZ(420px); }
.card:nth-child(6){ transform:rotateY(225deg) translateZ(420px); }
.card:nth-child(7){ transform:rotateY(270deg) translateZ(420px); }
.card:nth-child(8){ transform:rotateY(315deg) translateZ(420px); }


.card:hover img{
    transform:scale(1.15);
    box-shadow:
        0 0 25px #00eaff,
        0 0 60px #ff007f;
}



@keyframes spin{
    from{ transform:rotateY(0deg); }
    to{ transform:rotateY(360deg); }
}



.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.96);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.lightbox img{
    max-width:80%;
    max-height:80%;
    border-radius:12px;

    border:4px solid #00eaff;

    box-shadow:
        0 0 30px #00eaff,
        0 0 60px #ff007f;
}



.close{
    position:absolute;
    top:25px;
    right:40px;
    font-size:45px;
    cursor:pointer;
    color:#ff007f;
}



.prev,.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:60px;
    cursor:pointer;
    color:#00eaff;
    padding:20px;
}

.prev{ left:40px; }
.next{ right:40px; }

.prev:hover,.next:hover{
    color:#ff007f;
}

</style>
</head>

<body>

<h1>✨ IMAGE GALLERY</h1>

<div class="gallery-container">
    <div class="gallery">

        <div class="card"><img src="https://picsum.photos/seed/g1/500/400" onclick="openLightbox(0)"></div>
        <div class="card"><img src="https://picsum.photos/seed/g2/500/400" onclick="openLightbox(1)"></div>
        <div class="card"><img src="https://picsum.photos/seed/g3/500/400" onclick="openLightbox(2)"></div>
        <div class="card"><img src="https://picsum.photos/seed/g4/500/400" onclick="openLightbox(3)"></div>
        <div class="card"><img src="https://picsum.photos/seed/g5/500/400" onclick="openLightbox(4)"></div>
        <div class="card"><img src="https://picsum.photos/seed/g6/500/400" onclick="openLightbox(5)"></div>
        <div class="card"><img src="https://picsum.photos/seed/g7/500/400" onclick="openLightbox(6)"></div>
        <div class="card"><img src="https://picsum.photos/seed/g8/500/400" onclick="openLightbox(7)"></div>

    </div>
</div>



<div class="lightbox" id="lightbox">

<span class="close" onclick="closeLightbox()">✖</span>
<span class="prev" onclick="changeImage(-1)">❮</span>

<img id="lightbox-img">

<span class="next" onclick="changeImage(1)">❯</span>

</div>

<script>

let images = [
"https://picsum.photos/seed/g1/1200/800",
"https://picsum.photos/seed/g2/1200/800",
"https://picsum.photos/seed/g3/1200/800",
"https://picsum.photos/seed/g4/1200/800",
"https://picsum.photos/seed/g5/1200/800",
"https://picsum.photos/seed/g6/1200/800",
"https://picsum.photos/seed/g7/1200/800",
"https://picsum.photos/seed/g8/1200/800"
];

let currentIndex = 0;

function openLightbox(index){
    currentIndex = index;
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = images[index];
}

function closeLightbox(){
    document.getElementById("lightbox").style.display = "none";
}

function changeImage(step){
    currentIndex += step;

    if(currentIndex < 0){
        currentIndex = images.length - 1;
    }

    if(currentIndex >= images.length){
        currentIndex = 0;
    }

    document.getElementById("lightbox-img").src = images[currentIndex];
}

</script>

</body>
</html>
